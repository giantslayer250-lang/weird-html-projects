<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="physics_engine.css" />
    <script src="physics_engine.js" defer></script>

    <title>Physics Engine - Canvas</title>
</head>

<body>
    <div class="container">
        <div id="controls">
            <button class="btn0" id="add-ball-btn">Add Ball</button>  

            <button class="btn0" id="remove-ball-btn">Remove Ball</button>

            <button class="btn1" >Remove all Balls</button>

            <button class="btn2">Gravity : off</button>

            <button class="btn3">Wind Left</button>

            <button class="btn4">Wind Right</button>

            <button class="btn5" onclick="resetwind()">Reset wind</button>
            
            <div id="airfriction-controls">

                <button class="btn6" onclick="openAirEnvironment()">simulate open air environment</button>
                <button class="btn7" onclick="voidEnvironment()">simulate void environment</button>
                <button class="btn8" onclick="waterEnvironment()"> simulate water environment</button>
            </div>
        </div>
    </div>
    <canvas id="canvas"></canvas>
    </div>

    </div>
</body>

</html>
